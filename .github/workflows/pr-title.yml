name: PR Title Check
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            hotfix
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must start with lowercase and not end with a period.
            Example: "feat(auth): add oauth login"
