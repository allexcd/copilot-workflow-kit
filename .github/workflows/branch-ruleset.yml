name: Apply Branch Ruleset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/branch-ruleset.yml

jobs:
  apply-ruleset:
    runs-on: ubuntu-latest
    steps:
      - name: Apply main branch ruleset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if ruleset already exists
          EXISTING=$(gh api repos/${{ github.repository }}/rulesets \
            --header "Accept: application/vnd.github+json" \
            --jq '.[] | select(.name == "main-protection") | .id' 2>/dev/null || echo "")

          PAYLOAD='{
            "name": "main-protection",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/main"],
                "exclude": []
              }
            },
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" },
              {
                "type": "pull_request",
                "parameters": {
                  "required_approving_review_count": 1,
                  "dismiss_stale_reviews_on_push": true,
                  "require_code_owner_review": false,
                  "require_last_push_approval": false,
                  "required_review_thread_resolution": false
                }
              },
              {
                "type": "branch_name_pattern",
                "parameters": {
                  "operator": "regex",
                  "pattern": "^(feat|fix|chore|docs|refactor|test|hotfix)/[a-z0-9-]+"
                }
              },
              {
                "type": "required_status_checks",
                "parameters": {
                  "strict_required_status_checks_policy": false,
                  "required_status_checks": [
                    { "context": "check-pr-title" },
                    { "context": "lint" },
                    { "context": "test (18)" },
                    { "context": "test (20)" },
                    { "context": "test (22)" },
                    { "context": "build" }
                  ]
                }
              }
            ]
          }'

          if [ -n "$EXISTING" ]; then
            echo "Ruleset exists (id=$EXISTING). Updating..."
            gh api repos/${{ github.repository }}/rulesets/$EXISTING \
              --method PUT \
              --header "Accept: application/vnd.github+json" \
              --input - <<< "$PAYLOAD"
          else
            echo "Creating new ruleset..."
            gh api repos/${{ github.repository }}/rulesets \
              --method POST \
              --header "Accept: application/vnd.github+json" \
              --input - <<< "$PAYLOAD"
          fi
